<!DOCTYPE HTML>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Halal Vibes</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="description" content="Halal spots for coffee, food, and good vibes. SF Bay Area, San Diego, LA, Alexandria, Cairo, London. Food & vibes ratings." />
	<meta name="keywords" content="halal spots, halal coffee, halal food, halal restaurants, SF Bay Area, San Diego, Los Angeles, Alexandria Egypt, Cairo Egypt, London England, vibes" />
	<meta name="author" content="Yusuf Morsi" />

	<meta property="og:title" content="Halal Vibes Blog | Halal Coffee, Food & Vibes" />
	<meta property="og:description" content="Halal spots for coffee, food, and good vibes. SF Bay Area, San Diego, LA, Alexandria, Cairo, London." />
	<meta name="twitter:title" content="Halal Vibes Blog | Halal Coffee, Food & Vibes" />
	<meta name="twitter:card" content="summary" />

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
	<link rel="icon" type="image/png" href="images/Coffee_Transparent_PNG_Clip_Art_Image.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" href="css/bootstrap.css">
	<link rel="stylesheet" href="css/style.css">

	<style>
		:root {
			--primary-color: #2d4a3e;
			--primary-dark: #1a2f26;
			--secondary-color: #5a7c6e;
			--accent-warm: #c17f59;
			--accent-warm-hover: #a96b48;
			--text-color: #2d4a3e;
			--text-muted: #5a7c6e;
			--light-bg: #faf9f7;
			--light-bg-2: #f0ede8;
			--card-bg: #ffffff;
			--shadow-sm: 0 2px 8px rgba(45, 74, 62, 0.06);
			--shadow-md: 0 8px 30px rgba(45, 74, 62, 0.1);
			--shadow-lg: 0 20px 60px rgba(45, 74, 62, 0.12);
			--shadow-xl: 0 30px 80px rgba(45, 74, 62, 0.15);
			--radius: 20px;
			--radius-sm: 14px;
		}

		html {
			scroll-behavior: smooth;
			overflow-x: hidden;
			font-size: 16px;
		}

		body {
			font-family: 'Poppins', sans-serif;
			line-height: 1.7;
			color: var(--text-color);
			background: linear-gradient(180deg, var(--light-bg) 0%, #f5f2ee 100%);
			font-weight: 400;
			overflow-x: hidden;
			min-height: 100vh;
		}

		h1, h2, h3, h4, h5, h6 {
			font-family: 'Poppins', sans-serif;
			font-weight: 600;
			color: var(--primary-dark);
		}

		/* Hero header */
		#hv-header {
			background-image: url(images/blueclouds.jpg);
			background-position: center center;
			background-size: cover;
			position: relative;
			min-height: 32vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 4rem 2rem;
		}

		#hv-header .overlay {
			position: absolute;
			inset: 0;
			background: linear-gradient(180deg, rgba(26, 47, 38, 0.6) 0%, rgba(26, 47, 38, 0.75) 100%);
		}

		#hv-header .header-content {
			position: relative;
			z-index: 2;
			text-align: center;
			max-width: 800px;
			margin: 0 auto;
		}

		#hv-header .logo-link {
			position: absolute;
			top: 28px;
			left: 28px;
			display: flex;
			align-items: center;
			gap: 12px;
			color: white;
			text-decoration: none;
			font-weight: 500;
			font-size: 1.05rem;
			transition: opacity 0.2s;
		}

		#hv-header .logo-link:hover {
			opacity: 0.9;
			color: white;
		}

		#hv-header .logo-link img {
			width: 48px;
			height: 48px;
			border-radius: 50%;
			border: 2px solid rgba(255,255,255,0.5);
		}

		#hv-header h1 {
			font-family: 'Playfair Display', serif;
			color: white;
			font-size: clamp(2.75rem, 6vw, 4rem);
			margin-bottom: 16px;
			letter-spacing: -0.02em;
			line-height: 1.15;
			text-shadow: 0 2px 20px rgba(0,0,0,0.2);
		}

		#hv-header p {
			color: rgba(255,255,255,0.95);
			font-size: clamp(1.1rem, 2vw, 1.35rem);
			line-height: 1.6;
			max-width: 500px;
			margin: 0 auto;
		}

		/* Sticky nav: section tabs + city chips */
		.hv-nav-sticky {
			position: sticky;
			top: 0;
			z-index: 50;
			background: rgba(250, 249, 247, 0.94);
			backdrop-filter: blur(14px);
			-webkit-backdrop-filter: blur(14px);
			border-bottom: 1px solid rgba(45, 74, 62, 0.08);
			margin: -1rem -2rem 2.5rem;
			padding: 1.25rem 2rem 1.5rem;
		}

		.hv-section-tabs {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 6px;
			background: white;
			padding: 5px;
			border-radius: 14px;
			border: 1px solid rgba(45, 74, 62, 0.1);
			box-shadow: var(--shadow-sm);
			margin-bottom: 1.25rem;
		}

		.hv-section-tab {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 4px;
			padding: 12px 8px;
			font-size: 0.8rem;
			font-weight: 600;
			color: var(--text-muted);
			background: none;
			border: none;
			border-radius: 10px;
			cursor: pointer;
			transition: all 0.2s ease;
			text-align: center;
			line-height: 1.25;
		}

		.hv-section-tab i {
			font-size: 1.05rem;
			opacity: 0.75;
		}

		.hv-section-tab:hover {
			color: var(--primary-color);
			background: var(--light-bg-2);
		}

		.hv-section-tab.active {
			background: var(--primary-dark);
			color: white;
			box-shadow: 0 4px 14px rgba(26, 47, 38, 0.25);
		}

		.hv-section-tab.active i {
			opacity: 1;
		}

		.hv-section-tab:focus-visible {
			outline: 2px solid var(--accent-warm);
			outline-offset: 2px;
		}

		.hv-city-bar {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.hv-city-label {
			font-size: 0.75rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: var(--text-muted);
			flex-shrink: 0;
			display: none;
		}

		.hv-city-scroll-wrap {
			flex: 1;
			min-width: 0;
			position: relative;
		}

		.hv-city-scroll-wrap::after {
			content: '';
			position: absolute;
			right: 0;
			top: 0;
			bottom: 0;
			width: 32px;
			background: linear-gradient(90deg, transparent, rgba(250, 249, 247, 0.95));
			pointer-events: none;
		}

		.hv-city-scroll {
			display: flex;
			gap: 8px;
			overflow-x: auto;
			padding: 2px 24px 2px 2px;
			scroll-snap-type: x proximity;
			-webkit-overflow-scrolling: touch;
			scrollbar-width: none;
		}

		.hv-city-scroll::-webkit-scrollbar {
			display: none;
		}

		.hv-city-chip {
			flex-shrink: 0;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 8px 16px;
			font-size: 0.875rem;
			font-weight: 500;
			color: var(--primary-color);
			background: white;
			border: 1.5px solid rgba(45, 74, 62, 0.12);
			border-radius: 999px;
			cursor: pointer;
			transition: all 0.15s ease;
			scroll-snap-align: start;
			white-space: nowrap;
		}

		.hv-city-chip:hover {
			border-color: rgba(45, 74, 62, 0.25);
			background: var(--light-bg-2);
		}

		.hv-city-chip.active {
			background: var(--accent-warm);
			border-color: var(--accent-warm);
			color: white;
		}

		.hv-city-chip .chip-count {
			font-size: 0.75rem;
			font-weight: 600;
			opacity: 0.65;
			background: rgba(45, 74, 62, 0.08);
			padding: 2px 7px;
			border-radius: 999px;
		}

		.hv-city-chip.active .chip-count {
			background: rgba(255, 255, 255, 0.25);
			opacity: 1;
		}

		.hv-city-chip:focus-visible {
			outline: 2px solid var(--accent-warm);
			outline-offset: 2px;
		}

		.hv-results-header {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			gap: 1rem;
			margin-bottom: 1.5rem;
			padding-bottom: 0.75rem;
			border-bottom: 1px solid rgba(45, 74, 62, 0.08);
		}

		.hv-results-header h2 {
			font-size: 1.35rem;
			margin: 0;
			font-weight: 600;
		}

		.hv-results-header p {
			margin: 0;
			font-size: 0.9rem;
			color: var(--text-muted);
		}

		.hv-city-group {
			margin-bottom: 3rem;
		}

		.hv-city-group-header {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 1.25rem;
			padding: 0.5rem 0;
		}

		.hv-city-group-header h3 {
			font-size: 1.15rem;
			margin: 0;
			font-weight: 600;
			color: var(--primary-dark);
		}

		.hv-city-group-header span {
			font-size: 0.8rem;
			font-weight: 600;
			color: var(--text-muted);
			background: var(--light-bg-2);
			padding: 4px 10px;
			border-radius: 999px;
		}

		.hv-city-group-header::after {
			content: '';
			flex: 1;
			height: 1px;
			background: rgba(45, 74, 62, 0.1);
		}

		/* Ad slots - larger for better monetization */
		.hv-ad-slot {
			background: linear-gradient(135deg, var(--light-bg-2) 0%, #e8e4df 100%);
			border: 2px dashed var(--secondary-color);
			border-radius: var(--radius);
			min-height: 120px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-muted);
			font-size: 1rem;
			font-weight: 500;
			margin: 3rem 0;
			opacity: 0.85;
			letter-spacing: 0.03em;
		}

		.hv-ad-slot.leaderboard {
			min-height: 100px;
		}

		/* Support CTA - prominent for monetization */
		.hv-support-cta {
			background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-color) 100%);
			border-radius: var(--radius);
			padding: 3rem;
			text-align: center;
			margin: 4rem 0;
			box-shadow: var(--shadow-lg);
			color: white;
		}

		.hv-support-cta h3 {
			color: white;
			font-size: 1.75rem;
			margin-bottom: 12px;
		}

		.hv-support-cta p {
			opacity: 0.9;
			font-size: 1.1rem;
			margin-bottom: 1.5rem;
			max-width: 500px;
			margin-left: auto;
			margin-right: auto;
		}

		.hv-support-cta .cta-placeholder {
			display: inline-block;
			background: rgba(255,255,255,0.2);
			padding: 14px 32px;
			border-radius: 30px;
			font-weight: 600;
			font-size: 1rem;
			border: 2px solid rgba(255,255,255,0.4);
		}

		/* Main content - wider */
		.hv-main {
			max-width: 1400px;
			margin: 0 auto;
			padding: 3rem 2rem 5rem;
		}

		/* Entry cards - bigger, bolder */
		.hv-entries-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
			gap: 24px;
			margin-bottom: 0;
		}

		.hv-entry-card {
			background: var(--card-bg);
			border-radius: var(--radius);
			box-shadow: var(--shadow-md);
			overflow: hidden;
			transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
			border: 1px solid rgba(45, 74, 62, 0.06);
			display: flex;
			flex-direction: column;
			cursor: pointer;
		}

		.hv-entry-card:hover {
			box-shadow: var(--shadow-xl);
			transform: translateY(-8px);
			border-color: rgba(193, 127, 89, 0.2);
		}

		.hv-entry-card .card-image-wrap {
			position: relative;
			overflow: hidden;
		}

		.hv-entry-card .card-image {
			width: 100%;
			height: 260px;
			object-fit: cover;
			display: block;
			transition: transform 0.5s ease, filter 0.4s ease;
		}

		.hv-entry-card .card-image:not(.loaded) {
			filter: blur(8px) brightness(1.1);
			transform: scale(1.02);
		}

		.hv-entry-card .card-image.loaded {
			filter: blur(0) brightness(1);
			transform: scale(1);
		}

		.hv-entry-card:hover .card-image {
			transform: scale(1.06);
		}

		.hv-entry-card:hover .card-image.loaded {
			transform: scale(1.06);
		}

		.hv-entry-card .card-image-wrap::after {
			content: '';
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			height: 80px;
			background: linear-gradient(transparent, rgba(0,0,0,0.2));
			pointer-events: none;
		}

		.hv-entry-card .card-body {
			padding: 28px 32px;
			flex: 1;
			display: flex;
			flex-direction: column;
		}

		.hv-entry-card .card-title {
			font-size: 1.5rem;
			margin-bottom: 16px;
			color: var(--primary-dark);
			line-height: 1.3;
			font-weight: 600;
		}

		.hv-entry-card .card-stars {
			display: inline-flex;
			align-items: center;
			gap: 3px;
			margin-bottom: 12px;
			color: #d4a017;
			font-size: 0.95rem;
		}

		.hv-entry-card .card-stars .star-empty {
			color: rgba(45, 74, 62, 0.2);
		}

		.hv-entry-card .card-location {
			font-size: 0.85rem;
			font-weight: 500;
			color: var(--accent-warm-hover);
			margin-bottom: 6px;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.hv-entry-card .card-location i {
			font-size: 0.75rem;
			opacity: 0.7;
		}

		.hv-entry-card .card-tags {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-bottom: 16px;
		}

		.hv-entry-card .card-tag {
			background: var(--light-bg-2);
			color: var(--primary-color);
			font-size: 0.9rem;
			padding: 8px 16px;
			border-radius: 24px;
			font-weight: 500;
			transition: background 0.2s;
		}

		.hv-entry-card:hover .card-tag {
			background: rgba(193, 127, 89, 0.15);
			color: var(--accent-warm-hover);
		}

		.hv-entry-card .card-scores {
			display: flex;
			gap: 20px;
			margin-bottom: 20px;
			flex-wrap: wrap;
		}

		.hv-entry-card .card-score {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-size: 1rem;
			color: var(--text-muted);
			font-weight: 600;
			background: linear-gradient(135deg, rgba(193, 127, 89, 0.12) 0%, rgba(193, 127, 89, 0.06) 100%);
			padding: 8px 16px;
			border-radius: 20px;
			border: 1px solid rgba(193, 127, 89, 0.25);
		}

		.hv-entry-card .card-score strong {
			color: var(--accent-warm-hover);
		}

		.hv-entry-card .card-excerpt {
			font-size: 1.1rem;
			color: var(--text-muted);
			line-height: 1.7;
			margin-bottom: 24px;
			flex: 1;
		}

		.hv-entry-card .card-read-more {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			color: var(--accent-warm);
			font-weight: 600;
			text-decoration: none;
			font-size: 1.05rem;
			transition: all 0.25s;
			margin-top: auto;
		}

		.hv-entry-card .card-read-more i {
			transition: transform 0.25s;
		}

		.hv-entry-card:hover .card-read-more {
			color: var(--accent-warm-hover);
		}

		.hv-entry-card:hover .card-read-more i {
			transform: translateX(4px);
		}

		/* Modal - larger */
		.hv-modal-overlay {
			position: fixed;
			inset: 0;
			background: rgba(26, 47, 38, 0.75);
			backdrop-filter: blur(8px);
			z-index: 1000;
			display: none;
			align-items: center;
			justify-content: center;
			padding: 3rem;
			overflow-y: auto;
		}

		.hv-modal-overlay.active {
			display: flex;
		}

		.hv-modal {
			background: white;
			border-radius: var(--radius);
			box-shadow: var(--shadow-xl);
			max-width: 800px;
			width: 100%;
			max-height: 90vh;
			overflow-y: auto;
			position: relative;
		}

		.hv-modal-close {
			position: absolute;
			top: 24px;
			right: 24px;
			width: 48px;
			height: 48px;
			border: none;
			background: var(--light-bg-2);
			border-radius: 50%;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.5rem;
			color: var(--primary-dark);
			transition: all 0.2s;
			z-index: 2;
		}

		.hv-modal-close:hover {
			background: var(--accent-warm);
			color: white;
			transform: scale(1.05);
		}

		.hv-modal-content {
			padding: 3rem;
			padding-top: 4rem;
		}

		.hv-modal-content h2 {
			font-size: 2rem;
			margin-bottom: 20px;
		}

		.hv-modal-content h4 {
			margin-top: 2rem;
			margin-bottom: 0.75rem;
			font-size: 1.2rem;
			color: var(--accent-warm-hover);
		}

		.hv-modal-content p {
			margin-bottom: 1.25rem;
			font-size: 1.1rem;
			line-height: 1.8;
		}

		/* Footer */
		#fh5co-footer {
			padding: 4em 0;
			background: var(--primary-dark);
			text-align: center;
			color: rgba(255,255,255,0.85);
		}

		#fh5co-footer .footer-tool-link {
			background: rgba(255,255,255,0.1);
			color: white;
			border-color: rgba(255,255,255,0.2);
		}

		#fh5co-footer .footer-tool-link:hover {
			background: var(--accent-warm);
			color: white;
		}

		#fh5co-footer .footer-line,
		#fh5co-footer .footer-line a {
			color: rgba(255,255,255,0.8);
		}

		#fh5co-footer .footer-divider {
			border-color: rgba(255,255,255,0.2);
		}

		.footer-tools span {
			color: rgba(255,255,255,0.6) !important;
		}

		.footer-tools-links {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 0.75rem 1.25rem;
			align-items: center;
		}

		.footer-tool-link {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.65rem 1.2rem;
			background: white;
			color: var(--primary-color);
			text-decoration: none;
			font-weight: 600;
			font-size: 1rem;
			border-radius: 24px;
			border: 1px solid rgba(0, 0, 0, 0.06);
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
			transition: all 0.25s ease;
		}

		.footer-tool-link:hover {
			background: var(--light-bg-2);
			color: var(--primary-dark);
			transform: translateY(-2px);
		}

		.footer-divider {
			border: none;
			border-top: 1px solid rgba(0, 0, 0, 0.08);
			margin: 1.5rem auto 1rem;
			max-width: 320px;
		}

		.gototop {
			position: fixed;
			bottom: 28px;
			right: 28px;
			z-index: 999;
			opacity: 0;
			visibility: hidden;
			transition: 0.4s;
		}

		.gototop.active {
			opacity: 1;
			visibility: visible;
		}

		.js-gotop {
			background: var(--accent-warm);
			color: white;
			border-radius: 50%;
			width: 56px;
			height: 56px;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: var(--shadow-lg);
			text-decoration: none;
			transition: all 0.3s ease;
		}

		.js-gotop:hover {
			color: white;
			background: var(--accent-warm-hover);
			transform: translateY(-4px);
			box-shadow: var(--shadow-xl);
		}

		/* Empty state */
		.hv-empty-state {
			grid-column: 1 / -1;
			text-align: center;
			padding: 5rem 2rem;
			color: var(--text-muted);
			font-size: 1.2rem;
		}

			.hv-city-label {

		}

		@media (max-width: 768px) {
			#hv-header {
				min-height: 28vh;

			#hv-header .logo-link {

				left: 20px;

			.hv-nav-sticky {

			.hv-section-tabs {
				display: flex;
				overflow-x: auto;
				scrollbar-width: none;
				gap: 4px;

			.hv-section-tabs::-webkit-scrollbar {
				display: none;

			.hv-section-tab {
				flex: 1 0 auto;

				flex-direction: column;

				font-size: 0.78rem;

			.hv-city-label {
				display: none;

				flex-direction: column;
				gap: 0.25rem;

			.hv-main {

			.hv-entries-grid {

			}

			.hv-entry-card .card-image {

			}

			.hv-entry-card .card-body {
				padding: 24px;
			}

			.hv-entry-card .card-title {
				font-size: 1.35rem;
			}
		}
	</style>

</head>

<body>
	<div id="page">
		<header id="hv-header">

						<i class="fa-solid fa-mug-hot"></i>

					<button type="button" class="hv-section-tab" role="tab" aria-selected="false" data-section="restaurants" id="tab-restaurants">

					<button type="button" class="hv-section-tab" role="tab" aria-selected="false" data-section="desserts" id="tab-desserts">

			<div class="hv-results-header" id="hv-results-header">

			<div id="hv-entries-container"></div>

			<!-- Ad slot 2 - Mid content (rectangle)

			<div class="hv-support-cta">

		<!-- Entry detail modal -->
		<div id="hv-modal-overlay" class="hv-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="hv-modal-title">
			<div class="hv-modal">

		<div class="gototop js-top">

	<script src="js/jquery.min.js"></script>
	<script src="js/bootstrap.min.js"></script>
	<script src="halal-vibes/entries.js"></script>
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const SECTION_META = {
				sips: { title: 'Sips & Spots', subtitle: 'Coffee, bagels, parks & aesthetic spots' },
				restaurants: { title: 'Halal Restaurants', subtitle: 'Sit-down halal dining' },
				desserts: { title: 'Desserts', subtitle: 'Bakeries, donuts, pastries & sweet spots' },
				lounges: { title: 'Airport Lounges', subtitle: 'Layovers done right' }
			};

			const CITY_PRIORITY = ['San Diego', 'Los Angeles', 'San Jose', 'San Francisco'];

			const DESSERT_TAG_HINTS = ['desserts', 'donuts', 'pastries', 'croissants', 'bakery'];

			const SIPS_TAG_HINTS = [
				'bagels', 'bread', 'coffee', 'nature', 'gardens', 'park', 'venue', 'wedding',
				'views', 'tourist', 'specialty', 'yemeni', 'spanish latte', 'vietnamese',
				'study spot', 'south bay'
			];

			let sectionFilter = 'sips';
			let cityFilter = 'all';

			function normalizeCity(loc) {
				return loc.replace(/,\s*(Egypt|United Kingdom|Saudi Arabia|Turkey)$/i, '').trim();
			}

			function compareCities(a, b) {
				const pa = CITY_PRIORITY.indexOf(a);
				const pb = CITY_PRIORITY.indexOf(b);
				if (pa !== -1 && pb !== -1) return pa - pb;
				if (pa !== -1) return -1;
				if (pb !== -1) return 1;
				return a.localeCompare(b);
			}

			function getEntrySection(entry) {
				if (entry.categories.includes('lounges')) return 'lounges';
				if (entry.categories.includes('coffee')) return 'sips';
				if (entry.categories.length === 1 && entry.categories[0] === 'vibes') return 'sips';
				if (entry.tags.some(t => SIPS_TAG_HINTS.includes(t))) return 'sips';
				if (/coffee|bagel|park|garden|giardino|roaster|venue|perk|sky garden/i.test(entry.title)) return 'sips';
				if (entry.tags.some(t => DESSERT_TAG_HINTS.includes(t))) return 'desserts';
				if (/porto|donut|croissant|bakery/i.test(entry.title) && !/coffee house|coffee roaster/i.test(entry.title)) return 'desserts';
				if (entry.categories.includes('food')) return 'restaurants';
				return 'sips';
			}

			function renderStars(count) {
				let html = '<div class="card-stars" aria-label="' + count + ' out of 5 stars">';
				for (let i = 1; i <= 5; i++) {
					html += i <= count
						? '<i class="fa-solid fa-star"></i>'
						: '<i class="fa-regular fa-star star-empty"></i>';
				}
				html += '</div>';
				return html;
			}

			function getSectionEntries(section) {
				return HALAL_VIBES_ENTRIES.filter(e => getEntrySection(e) === section);
			}

			function getCityCounts(entries) {
				const counts = {};
				entries.forEach(e => {
					const city = normalizeCity(e.location);
					counts[city] = (counts[city] || 0) + 1;
				});
				return Object.entries(counts).sort((a, b) => compareCities(a[0], b[0]));
			}

			function matchesFilters(entry) {
				if (getEntrySection(entry) !== sectionFilter) return false;
				if (cityFilter === 'all') return true;
				return normalizeCity(entry.location) === cityFilter;
			}

			function renderCityChips() {
				const container = document.getElementById('hv-city-chips');
				const sectionEntries = getSectionEntries(sectionFilter);
				const cities = getCityCounts(sectionEntries);
				container.innerHTML = '';

				const allChip = document.createElement('button');
				allChip.type = 'button';
				allChip.className = 'hv-city-chip' + (cityFilter === 'all' ? ' active' : '');
				allChip.innerHTML = `All cities <span class="chip-count">${sectionEntries.length}</span>`;
				allChip.addEventListener('click', () => {
					cityFilter = 'all';
					renderCityChips();
					renderCards();
				});
				container.appendChild(allChip);

				cities.forEach(([city, count]) => {
					const chip = document.createElement('button');
					chip.type = 'button';
					chip.className = 'hv-city-chip' + (cityFilter === city ? ' active' : '');
					chip.innerHTML = `${city} <span class="chip-count">${count}</span>`;
					chip.addEventListener('click', () => {
						cityFilter = city;
						renderCityChips();
						renderCards();
					});
					container.appendChild(chip);
				});
			}

			function updateResultsHeader(count) {
				const meta = SECTION_META[sectionFilter];
				document.getElementById('hv-results-title').textContent = meta.title;
				const subtitle = document.getElementById('hv-results-subtitle');
				if (count === 0) {
					subtitle.textContent = 'No spots in this section yet.';
				} else if (cityFilter === 'all') {
					subtitle.textContent = `${count} spot${count === 1 ? '' : 's'} · grouped by city`;
				} else {
					subtitle.textContent = `${count} spot${count === 1 ? '' : 's'} in ${cityFilter}`;
				}
			}

			const hvImageObserver = (function() {
				const obs = new IntersectionObserver((entries) => {
					entries.forEach(entry => {
						if (!entry.isIntersecting) return;
						const img = entry.target;
						obs.unobserve(img);
						const src = img.getAttribute('data-src');
						if (!src) return;
						img.removeAttribute('data-src');
						img.addEventListener('load', function() { this.classList.add('loaded'); });
						img.src = src;
						if (img.complete && img.naturalHeight) img.classList.add('loaded');
					});
				}, { rootMargin: '200px' });
				return {
					observeAll: function(container) {
						container.querySelectorAll('.card-image[data-src]').forEach(img => obs.observe(img));
					}
				};
			})();

			function buildCard(entry) {
				const card = document.createElement('article');
				card.className = 'hv-entry-card';
				card.dataset.slug = entry.slug;

				const imgSrc = entry.image ? (entry.image.startsWith('http') ? entry.image : './' + entry.image) : '';
				const imgSection = entry.image ? `
					<div class="card-image-wrap">
						<img class="card-image" data-src="${imgSrc}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="${entry.title}" loading="lazy" onerror="this.parentElement.style.display='none'">
					</div>` : '';

				const scoresHtml = entry.stars != null ? renderStars(entry.stars) : [
					entry.foodScore != null ? `<span class="card-score"><strong>Food ${entry.foodScore}/10</strong></span>` : '',
					entry.vibesScore != null ? `<span class="card-score"><strong>Vibes ${entry.vibesScore}/10</strong></span>` : ''
				].filter(Boolean).join('');

				const scoresWrap = entry.stars != null
					? scoresHtml
					: (scoresHtml ? `<div class="card-scores">${scoresHtml}</div>` : '');

				card.innerHTML = `
					${imgSection}
					<div class="card-body">
						<p class="card-location"><i class="fa-solid fa-location-dot"></i> ${normalizeCity(entry.location)}</p>
						<h3 class="card-title">${entry.title}</h3>
						${scoresWrap}
						${entry.excerpt ? `<p class="card-excerpt">${entry.excerpt}</p>` : ''}
						<a href="#${entry.slug}" class="card-read-more" data-slug="${entry.slug}">Read more <i class="fa-solid fa-arrow-right"></i></a>
					</div>
				`;

				card.addEventListener('click', function(e) {
					e.preventDefault();
					openModal(entry.slug);
				});

				return card;
			}

			function renderCards() {
				const container = document.getElementById('hv-entries-container');
				container.innerHTML = '';
				const filtered = HALAL_VIBES_ENTRIES.filter(matchesFilters);

				updateResultsHeader(filtered.length);

				if (filtered.length === 0) {
					container.innerHTML = '<p class="hv-empty-state">No spots here yet. Try another city or section.</p>';
					return;
				}

				if (cityFilter === 'all') {
					const grouped = {};
					filtered.forEach(entry => {
						const city = normalizeCity(entry.location);
						if (!grouped[city]) grouped[city] = [];
						grouped[city].push(entry);
					});

					const sortedCities = Object.keys(grouped).sort(compareCities);

					sortedCities.forEach(city => {
						const group = document.createElement('section');
						group.className = 'hv-city-group';

						const header = document.createElement('div');
						header.className = 'hv-city-group-header';
						header.innerHTML = `<h3>${city}</h3><span>${grouped[city].length} spot${grouped[city].length === 1 ? '' : 's'}</span>`;
						group.appendChild(header);

						const grid = document.createElement('div');
						grid.className = 'hv-entries-grid';
						grouped[city].forEach(entry => grid.appendChild(buildCard(entry)));
						group.appendChild(grid);

						container.appendChild(group);
					});
				} else {
					const grid = document.createElement('div');
					grid.className = 'hv-entries-grid';
					filtered.forEach(entry => grid.appendChild(buildCard(entry)));
					container.appendChild(grid);
				}

				hvImageObserver.observeAll(container);
			}

			function setSection(section) {
				sectionFilter = section;
				cityFilter = 'all';
				document.querySelectorAll('.hv-section-tab').forEach(tab => {
					const active = tab.dataset.section === section;
					tab.classList.toggle('active', active);
					tab.setAttribute('aria-selected', active ? 'true' : 'false');
				});
				renderCityChips();
				renderCards();
				if (history.replaceState) {
					history.replaceState(null, '', '?section=' + section);
				}
			}

			document.querySelectorAll('.hv-section-tab').forEach(tab => {
				tab.addEventListener('click', () => setSection(tab.dataset.section));
			});

			const urlSection = new URLSearchParams(window.location.search).get('section');
			if (urlSection && SECTION_META[urlSection]) {
				sectionFilter = urlSection;
				document.querySelectorAll('.hv-section-tab').forEach(tab => {
					const active = tab.dataset.section === urlSection;
					tab.classList.toggle('active', active);
					tab.setAttribute('aria-selected', active ? 'true' : 'false');
				});
			}

			renderCityChips();
			renderCards();

			function openModal(slug) {
				const entry = HALAL_VIBES_ENTRIES.find(e => e.slug === slug);
				if (!entry) return;
				const content = document.getElementById('hv-modal-content');
				content.innerHTML = `
					<h2 id="hv-modal-title">${entry.title}</h2>
					<div class="card-tags" style="margin-bottom: 1rem;">
						<span class="card-tag">${normalizeCity(entry.location)}</span>
						<span class="card-tag">${SECTION_META[getEntrySection(entry)].title}</span>
					</div>
					${entry.stars != null ? renderStars(entry.stars) : ''}
					${entry.foodScore != null ? `<p><strong>Food:</strong> ${entry.foodScore}/10</p>` : ''}
					${entry.vibesScore != null ? `<p><strong>Vibes:</strong> ${entry.vibesScore}/10</p>` : ''}
					<div class="hv-modal-body">${entry.content}</div>
				`;
				document.getElementById('hv-modal-overlay').classList.add('active');
				document.body.style.overflow = 'hidden';
			}

			function closeModal() {
				document.getElementById('hv-modal-overlay').classList.remove('active');
				document.body.style.overflow = '';
			}

			document.getElementById('hv-modal-close').addEventListener('click', closeModal);
			document.getElementById('hv-modal-overlay').addEventListener('click', function(e) {
				if (e.target === this) closeModal();
			});
			document.addEventListener('keydown', function(e) {
				if (e.key === 'Escape') closeModal();
			});

			if (window.location.hash) {
				const slug = window.location.hash.slice(1);
				if (HALAL_VIBES_ENTRIES.some(e => e.slug === slug)) {
					const entry = HALAL_VIBES_ENTRIES.find(e => e.slug === slug);
					const entrySection = getEntrySection(entry);
					if (entrySection !== sectionFilter) setSection(entrySection);
					setTimeout(() => openModal(slug), 100);
				}
			}

			const gotop = document.querySelector('.gototop');
			window.addEventListener('scroll', function() {
				gotop.classList.toggle('active', window.scrollY > 400);
			});
			document.querySelector('.js-gotop').addEventListener('click', function(e) {
				e.preventDefault();
				window.scrollTo({ top: 0, behavior: 'smooth' });
			});
		});
	</script>
