.topbar-inner{max-width:none;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:relative}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0;text-decoration:none;color:inherit}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(145deg,var(--brand),var(--brand-2));color:#fff;display:grid;place-items:center;font-size:17px;box-shadow:0 4px 12px rgba(4,120,87,.25)}
.brand-text h1{font-size:1.05rem;font-weight:700;letter-spacing:-.03em;line-height:1.2}
.brand-text p{font-size:.72rem;color:var(--muted);font-weight:500;margin-top:1px}
.search{flex:1;min-width:0;max-width:480px;position:relative}
.search input{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:10px 16px 10px 40px;font:inherit;font-size:.9rem;transition:border-color .15s,box-shadow .15s,background .15s}
.search input:focus{outline:none;border-color:var(--brand-2);background:#fff;box-shadow:0 0 0 3px rgba(5,150,105,.12)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);width:17px;height:17px;pointer-events:none}
.actions{display:flex;gap:8px;flex-shrink:0;margin-left:auto}
.btn{border:none;border-radius:999px;padding:9px 16px;font:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:transform .12s,background .15s,box-shadow .15s;white-space:nowrap;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.98)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn-ghost:hover{background:#f8fafc;border-color:#cbd5e1}
.btn-ghost.active{background:var(--brand-soft);border-color:#6ee7b7;color:var(--brand)}
.btn-primary{background:linear-gradient(145deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 4px 14px rgba(4,120,87,.28)}
.btn-primary:hover{filter:brightness(1.05)}
.btn-icon{display:none}
.btn-label-short{display:none}
.app-main{flex:1;min-height:0;display:flex;position:relative}
.map-wrap{flex:1;min-width:0;position:relative;background:#dbe4ec}
#map{position:absolute;inset:0;background:#dbe4ec}
.map-legend{position:absolute;bottom:16px;left:16px;right:auto;z-index:500;display:flex;flex-wrap:wrap;gap:6px 12px;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:.72rem;font-weight:600;color:var(--muted);box-shadow:var(--shadow-sm);max-width:calc(100% - 56px);pointer-events:none}
.legend-item{display:inline-flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.legend-dot.verified{background:#059669}
.legend-dot.warmed{background:#d97706}
.legend-dot.internet{background:#2563eb}
.legend-dot.limited{background:#059669;border-style:dashed;outline:1px dashed #fb923c;outline-offset:1px}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0;box-shadow:-6px 0 24px rgba(15,23,42,.04)}
.sidebar-head{flex-shrink:0;padding:14px 16px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#fafbfc 100%)}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.segmented{display:inline-flex;background:#eef2f6;border-radius:999px;padding:3px;gap:2px}
.segmented button{border:none;background:transparent;border-radius:999px;padding:7px 14px;font:inherit;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:color .15s,background .15s,box-shadow .15s;min-height:40px;-webkit-tap-highlight-color:transparent}
.segmented button.active{background:#fff;color:var(--brand);box-shadow:var(--shadow-sm)}
.more-filters{margin-left:auto;font-size:.82rem}
.more-filters summary{cursor:pointer;list-style:none;font-weight:600;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);transition:background .15s,border-color .15s,color .15s}
.more-filters summary::-webkit-details-marker{display:none}
.more-filters[open] summary{border-color:#a7f3d0;background:var(--brand-soft);color:var(--brand)}
.more-panel{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:#f8fafc;border:1px solid var(--line);border-radius:var(--radius)}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font:inherit;font-size:.76rem;font-weight:600;color:var(--muted);cursor:pointer;transition:background .15s,border-color .15s,color .15s;min-height:40px;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:#cbd5e1;color:var(--text)}
.chip.active{background:var(--brand-soft);border-color:#6ee7b7;color:var(--brand)}
.count-line{font-size:.8rem;color:var(--muted);margin-top:10px;line-height:1.4}
.count-line strong{color:var(--text);font-weight:700;font-size:.92rem}
.count-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.count-badge{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:999px;background:#f1f5f9;color:#475569}
#locationList{flex:1 1 0;min-height:0;overflow-x:hidden;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#locationList::-webkit-scrollbar{width:6px}
#locationList::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
#locationList > .card{display:block;width:100%;height:auto;min-height:0;margin:0 0 10px;padding:14px 14px 14px 18px;position:relative;border:1px solid var(--line);border-radius:var(--radius);background:#fff;cursor:pointer;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
#locationList > .card:last-child{margin-bottom:0}
.card{position:relative;border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 14px 18px;background:#fff;cursor:pointer;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brand-2);border-radius:var(--radius) 0 0 var(--radius)}
.card--warmed::before{background:#d97706}
.card--internet::before{background:#2563eb}
.card:hover{border-color:#86efac;box-shadow:var(--shadow-sm)}
.card.active{border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(5,150,105,.12)}
.card-limited{background:#fffbf7}
.card-limited::before{background:#fb923c}
.card-limited h3{color:#9a3412}
.card h3{font-size:.92rem;font-weight:700;line-height:1.45;margin:0 0 6px;letter-spacing:-.01em;word-break:break-word;overflow:visible}
.card .addr{font-size:.78rem;color:var(--muted);margin:0 0 3px;line-height:1.45;overflow:visible}
.card .loc{font-size:.76rem;color:#94a3b8;margin:0 0 8px;line-height:1.45;overflow:visible}
.card-note{font-size:.74rem;color:#9a3412;margin:0 0 8px;line-height:1.4}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.card-tags:last-child{margin-bottom:0}
.tag{font-size:.7rem;font-weight:700;padding:5px 10px;border-radius:999px;white-space:nowrap;line-height:1.2;display:inline-block;vertical-align:middle}
.tag-verified{background:var(--brand-soft);color:var(--brand)}
.tag-warmed{background:var(--warm-soft);color:var(--warm)}
.tag-internet{background:var(--web-soft);color:var(--web)}
.tag-limited{background:var(--limited-soft);color:var(--limited);border:1px solid #fed7aa}
.tag-type{background:#f1f5f9;color:#475569}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding-top:8px;border-top:1px solid #f1f5f9}
.card-foot{margin-left:auto}
.dist{font-size:.72rem;color:var(--muted);font-weight:600}
.access-warn{background:var(--limited-soft);border:1px solid #fed7aa;border-radius:var(--radius);padding:12px 14px;margin:12px 0;font-size:.84rem;color:#9a3412;line-height:1.45}
.access-warn strong{display:block;font-size:.88rem;margin-bottom:4px}
.source-quote{background:#f8fafc;border-left:3px solid var(--web);border-radius:0 var(--radius) var(--radius) 0;padding:12px 14px;margin:12px 0;font-size:.84rem;color:#334155;line-height:1.5;font-style:italic}
.source-quote strong{display:block;font-style:normal;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:.88rem;line-height:1.5}
.empty-icon{font-size:2rem;display:block;margin-bottom:8px;opacity:.5}
mark.hl{background:#fef08a;border-radius:3px;padding:0 2px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px;z-index:2000}
.overlay.open{display:flex}
.dialog{background:#fff;border-radius:20px;max-width:520px;width:100%;max-height:90vh;overflow:auto;padding:24px;position:relative;box-shadow:var(--shadow-lg);animation:dialogIn .2s ease}
@keyframes dialogIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.dialog-close{position:absolute;top:14px;right:14px;width:36px;height:36px;border:none;border-radius:999px;background:#f1f5f9;cursor:pointer;font-size:20px;line-height:1;color:var(--muted);transition:background .15s,color .15s}
.dialog-close:hover{background:#e2e8f0;color:var(--text)}
.dialog.wide{max-width:680px}
#addDialog.dialog.wide{max-width:min(800px,96vw);max-height:95vh;display:flex;flex-direction:column;overflow:hidden;padding:18px 20px 16px}
#addDialog .sub{flex-shrink:0;margin-bottom:6px}
#addDialog .coord-hint{flex-shrink:0;margin:6px 0}
#addDialog h2{flex-shrink:0}
#airtablePanel:not([hidden]){flex:1 1 auto;min-height:0;display:flex;flex-direction:column;margin-top:4px}
.dialog h2{font-size:1.2rem;font-weight:700;padding-right:40px;letter-spacing:-.02em;line-height:1.3}
.coord-hint{font-size:.8rem;color:var(--brand);background:var(--brand-soft);border-radius:var(--radius);padding:8px 12px;margin:10px 0;display:none}
.coord-hint.show{display:block}
.airtable-embed{width:100%;flex:1 1 auto;min-height:520px;height:calc(95vh - 10.5rem);max-height:900px;border:1px solid var(--line);border-radius:var(--radius);background:#fff}
.dialog .sub{color:var(--muted);font-size:.86rem;margin:6px 0 14px}
.dialog a:not(.btn){color:var(--web);font-weight:600;text-decoration:none}
.dialog a:not(.btn):hover{text-decoration:underline}
.dialog .row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.dialog-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.dialog-actions .btn{text-decoration:none;display:inline-flex;align-items:center}
.form label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.03em}
.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:.88rem;transition:border-color .15s,box-shadow .15s}
.form input:focus,.form select:focus,.form textarea:focus{outline:none;border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(5,150,105,.1)}
.form textarea{min-height:72px;resize:vertical}
.form .hint{font-size:.76rem;color:var(--muted);margin-bottom:8px}
.site-footer{flex-shrink:0;text-align:center;padding:7px 16px calc(7px + var(--safe-bottom));font-size:.75rem;border-top:1px solid var(--line);background:var(--surface);color:var(--muted);position:relative;z-index:210}
.site-footer-nav{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:0.15rem 0.35rem}
.site-footer a{color:var(--brand);text-decoration:none;font-weight:600;padding:4px 2px;-webkit-tap-highlight-color:transparent}
.site-footer a:hover{text-decoration:underline}
.mobile-tabs{display:none;flex-shrink:0;border-top:1px solid var(--line);background:var(--surface);padding:8px 12px calc(8px + var(--safe-bottom));gap:8px;z-index:200;box-shadow:0 -4px 20px rgba(15,23,42,.06)}
.mobile-tab{flex:1;border:none;border-radius:999px;padding:12px 10px;font:inherit;font-size:.88rem;font-weight:700;color:var(--muted);background:transparent;cursor:pointer;transition:background .15s,color .15s;min-height:48px;display:inline-flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
.mobile-tab.active{background:var(--brand-soft);color:var(--brand)}
.mobile-tab-icon{font-size:1.05rem;line-height:1}
.custom-marker{background:transparent!important;border:none!important}
@media(max-width:820px){
  :root{--sidebar-w:100%}
  .topbar-inner{padding:8px 12px 10px;gap:8px;align-items:center;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto}
  .brand{flex:1;min-width:0;grid-column:1;grid-row:1}
  .actions{grid-column:2;grid-row:1;margin-left:0;align-self:center}
  .brand-text h1{font-size:.98rem}
  .brand-text p{display:none}
  .logo{width:34px;height:34px;font-size:15px;border-radius:10px}
  .search{order:unset;grid-column:1/-1;grid-row:2;flex:1 1 100%;max-width:none;width:100%}
  .search input{font-size:16px;padding:11px 14px 11px 40px}
  .actions{flex-shrink:0;gap:6px}
  .actions .btn-label{display:none}
  .actions #nearMeBtn{min-width:44px;padding:0 12px}
  .actions #nearMeBtn .btn-icon{display:inline}
  .actions #addBtn .btn-label-short{display:none}
  .actions #addBtn .btn-label-full{display:inline}
  .app-main{flex-direction:column;min-height:0;flex:1}
  .app-main:not(.show-list) .map-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
  .app-main:not(.show-list) .sidebar{display:none}
  .app-main.show-list .map-wrap{display:none}
  .app-main.show-list .sidebar{flex:1;width:100%;min-height:0;border-left:none;box-shadow:none;display:flex}
  .map-legend{bottom:12px;left:12px;right:52px;border-radius:12px;padding:6px 10px;gap:4px 8px;font-size:.65rem;max-width:none}
  .legend-dot{width:8px;height:8px}
  .mobile-tabs{display:flex}
  .site-footer{padding:6px 12px calc(6px + var(--safe-bottom));font-size:.7rem}
  .overlay{align-items:flex-end;padding:0}
  .overlay.open .dialog,.overlay.open .dialog.wide{border-radius:20px 20px 0 0;max-height:min(96dvh,900px);padding:16px 14px calc(14px + var(--safe-bottom));animation:sheetIn .25s ease}
  .overlay.open #addDialog.dialog.wide{max-height:96dvh;height:96dvh}
  @keyframes sheetIn{from{transform:translateY(100%)}to{transform:none}}
  .dialog-close{top:12px;right:12px;width:40px;height:40px}
  .dialog-actions .btn{flex:1;justify-content:center;padding:12px 16px}
  .airtable-embed{min-height:360px;height:calc(96dvh - 9rem);max-height:none}
  .card h3{font-size:.92rem}
  .more-filters{margin-left:0;flex:1}
  .more-filters summary{display:flex;align-items:center;justify-content:center;min-height:40px}
  .filter-row{width:100%}
  .segmented{flex:1}
  .segmented button{flex:1;padding:8px 10px}
}
@media(max-width:820px) and (min-width:421px){
  .actions #addBtn .btn-label-short{display:inline}
  .actions #addBtn .btn-label-full{display:none}
}
@media(max-width:420px){
  .actions #addBtn .btn-label-short{display:inline}
  .actions #addBtn .btn-label-full{display:none}
  .map-legend{display:grid;grid-template-columns:1fr 1fr;right:12px}
}
@media(min-width:821px){
  .mobile-tabs{display:none!important}
  .btn-icon{display:none!important}
  .btn-label-short{display:none!important}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/bidetbeacon">
        <div class="logo" aria-hidden="true">🚿</div>
        <div class="brand-text">
          <h1>BidetBeacon</h1>
          <p>Find bidets at masajed &amp; restaurants</p>
        </div>
      </a>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input type="search" id="searchInput" placeholder="Search city, name, or address…" autocomplete="off" aria-label="Search locations">
      </div>
      <div class="actions">
        <button type="button" class="btn btn-ghost" id="nearMeBtn" aria-label="Find places near me">
          <span class="btn-icon" aria-hidden="true">📍</span>
          <span class="btn-label">Near me</span>
        </button>
        <button type="button" class="btn btn-primary" id="addBtn">
          <span class="btn-label-full">Add spot</span>
          <span class="btn-label-short">Add</span>
        </button>
      </div>
    </div>
  </header>

  <div class="app-main" id="appMain">
    <div class="map-wrap">
      <div id="map" role="application" aria-label="Map of bidet locations"></div>
      <div class="map-legend" aria-label="Map legend">
        <span class="legend-item"><span class="legend-dot verified"></span> Verified</span>
        <span class="legend-item"><span class="legend-dot warmed"></span> Heated</span>
        <span class="legend-item"><span class="legend-dot internet"></span> Web source</span>
        <span class="legend-item"><span class="legend-dot limited"></span> Limited</span>
      </div>
    </div>
    <aside class="sidebar" aria-label="Location list">
      <div class="sidebar-head">
        <div class="filter-row">
          <div class="segmented" id="placeFilter" role="group" aria-label="Place type">
            <button type="button" class="active" data-type="all">All</button>
            <button type="button" data-type="mosque">Masajed</button>
          </div>
          <details class="more-filters">
            <summary>Filters</summary>
            <div class="more-panel" id="typeChips">
              <button type="button" class="chip" data-type="restaurant">Restaurants</button>
              <button type="button" class="chip" data-type="verified">User verified</button>
              <button type="button" class="chip" data-type="internet">From internet</button>
              <button type="button" class="chip" data-type="public">Public access</button>
              <button type="button" class="chip" data-type="limited">Limited access</button>
            </div>
          </details>
        </div>
        <p class="count-line" id="countLabel">Loading…</p>
      </div>
      <div id="locationList"></div>
    </aside>
  </div>

  <nav class="mobile-tabs" role="tablist" aria-label="Map or list view">
    <button type="button" class="mobile-tab active" data-view="map" role="tab" aria-selected="true"><span class="mobile-tab-icon" aria-hidden="true">🗺️</span> Map</button>
    <button type="button" class="mobile-tab" data-view="list" role="tab" aria-selected="false"><span class="mobile-tab-icon" aria-hidden="true">📋</span> List</button>
  </nav>

  <footer class="site-footer">
    <nav class="site-footer-nav" aria-label="Site links">
      <a id="bbFooterPortfolio" href="/">Portfolio</a>
      <span aria-hidden="true">·</span>
      <a id="bbFooterHalal" href="/halal-vibes">Halal Vibes</a>
      <span aria-hidden="true">·</span>
      <span>BidetBeacon</span>
      <span aria-hidden="true">·</span>
      <a class="github-star-footer" href="https://github.com/ymorsi7/ymorsi7.github.io" target="_blank" rel="noopener noreferrer" aria-label="Star on GitHub"><i class="fa-brands fa-github" aria-hidden="true"></i><span>Star</span></a>
    </nav>
  </footer>
</div>

<div class="overlay" id="detailOverlay" role="dialog" aria-modal="true">
  <div class="dialog" id="detailDialog">
    <button type="button" class="dialog-close" id="detailClose" aria-label="Close">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="overlay" id="addOverlay" role="dialog" aria-modal="true">
  <div class="dialog wide" id="addDialog">
    <button type="button" class="dialog-close" id="addClose" aria-label="Close">×</button>
    <h2>Suggest a verified spot</h2>
    <p class="sub" id="addIntro">Only confirmed bidets (TOTO, heated seat, handheld, etc.). Submissions are reviewed before appearing on the map.</p>
    <p class="coord-hint" id="coordHint"></p>
    <div id="airtablePanel" hidden>
      <iframe id="airtableEmbed" class="airtable-embed" title="BidetBeacon submission form"></iframe>
    </div>
    <div class="form" id="emailPanel">
      <label for="addName">Name *</label>
      <input id="addName" required>
      <label for="addAddress">Address</label>
      <input id="addAddress">
      <label for="addCity">City</label>
      <input id="addCity">
      <label for="addCountry">Country</label>
      <input id="addCountry" value="USA">
      <label for="addType">Type</label>
      <select id="addType"><option value="mosque">Masjid</option><option value="restaurant">Restaurant / café</option></select>
      <label for="addStatus">Bidet type</label>
      <select id="addStatus">
        <option value="verified">Verified bidet</option>
        <option value="warmed">Heated seat / TOTO-style</option>
      </select>
      <label for="addEmail">Your email (optional)</label>
      <input id="addEmail" type="email" placeholder="So we can follow up if needed">
      <label for="addBidetType">Bidet details *</label>
      <input id="addBidetType" required placeholder="e.g. TOTO Washlet, heated seat, handheld sprayer">
      <label for="addNotes">Anything else?</label>
      <textarea id="addNotes" placeholder="Restroom location, hours, tips…"></textarea>
      <input type="text" id="addHoney" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
      <label for="addLat">Latitude</label>

<script>
(function(){
  // Airtable free tier: 1,000 records/base, plenty for submissions.
  // Setup: airtable.com → New base → add fields below → Create form → Share → Embed → paste URL here.
  // Fields: Name, Address, City, Country, Type, Bidet Status, Bidet Details, Latitude, Longitude, Email, Notes
  const AIRTABLE_FORM_EMBED_URL = 'https://airtable.com/embed/appooaJBbg4weWhI0/shrYzqffjo9JpweKW';
  const SUBMIT_EMAIL = 'ymorsi8+bidet@gmail.com'; // fallback until Airtable URL is set

  const HAS_BIDET = s => s === 'verified' || s === 'warmed' || s === 'internet';
  const useAirtable = () => Boolean(AIRTABLE_FORM_EMBED_URL);

  let allLocations = [], userLocation = null, map, clusterGroup, pickMarker;
  let placeFilter = 'all', extraFilter = null, nearMe = false, radiusMi = 50;

  function stableSeedId(row){
    const s = (row.name||'') + '|' + row.latitude + '|' + row.longitude;
    let h = 0; for (let i=0;i<s.length;i++) h = ((h<<5)-h+s.charCodeAt(i))|0;
    return 'seed_' + Math.abs(h).toString(36);
  }

  function haversineMiles(a,b){
    const R=3959,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
    const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }

  function normalizeSeed(row){
    const s = row.bidetStatus;
    let defaultType = 'Verified bidet';
    if(s === 'warmed') defaultType = 'Heated seat';
    else if(s === 'internet') defaultType = 'Web source';
    const access = row.access === 'limited' ? 'limited' : 'public';
    return {
      id: stableSeedId(row), name: row.name, address: row.address||'', latitude: String(row.latitude), longitude: String(row.longitude),
      city: row.city||'', country: row.country||'', type: row.type||'mosque', bidetStatus: s,
      bidetType: row.bidetType || defaultType,
      sourceUrl: row.sourceUrl || '',
      sourceQuote: row.sourceQuote || '',
      access,
      accessNote: access === 'limited' ? (row.accessNote || 'Not a regular public restroom') : ''
    };
  }

  function initData(){
    allLocations = (window.BIDETBEACON_SEED||[]).map(normalizeSeed).filter(l => HAS_BIDET(l.bidetStatus));
  }

  function initSubmitPanel(){
    const airtablePanel = document.getElementById('airtablePanel');
    const emailPanel = document.getElementById('emailPanel');
    const intro = document.getElementById('addIntro');
    if(useAirtable()){
      document.getElementById('airtableEmbed').src = AIRTABLE_FORM_EMBED_URL;
      airtablePanel.hidden = false;
      emailPanel.hidden = true;
      intro.textContent = 'Click the map to copy coordinates, then paste them into the form. Submissions go straight to Airtable for review.';
    } else {
      airtablePanel.hidden = true;
      emailPanel.hidden = false;
      intro.textContent = 'Click the map to drop a pin, then submit. We\'ll review and add confirmed bidets (TOTO, handheld, heated, etc.).';
    }
  }

  function showCoordHint(lat, lng){
    const hint = document.getElementById('coordHint');
    const text = lat.toFixed(6) + ', ' + lng.toFixed(6);
    hint.textContent = useAirtable()
      ? 'Coordinates copied: ' + text + '. Paste into Latitude / Longitude in the form.'
      : 'Pin set at ' + text;
    hint.classList.add('show');
    if(useAirtable() && navigator.clipboard){
      navigator.clipboard.writeText(text).catch(()=>{});
    }
  }

  function validCoord(m){
    const lat=+m.latitude,lng=+m.longitude;
    return !isNaN(lat)&&!isNaN(lng)&&lat>=-90&&lat<=90&&lng>=-180&&lng<=180;
  }

  function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function highlight(text,q){
    if(!q||!text) return escapeHtml(text||'');
    const t=String(text), i=t.toLowerCase().indexOf(q);
    if(i===-1) return escapeHtml(t);
    return escapeHtml(t.slice(0,i))+'<mark class="hl">'+escapeHtml(t.slice(i,i+q.length))+'</mark>'+escapeHtml(t.slice(i+q.length));
  }

  function getQuery(){ return document.getElementById('searchInput').value.trim().toLowerCase(); }

  function isMobile(){ return window.matchMedia('(max-width:820px)').matches; }

  function setOverlayOpen(id, open){
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.toggle('open', open);
    const anyOpen = document.querySelector('.overlay.open');
    document.body.classList.toggle('modal-open', Boolean(anyOpen));
  }

  function setMobileView(view){
    document.querySelectorAll('.mobile-tab').forEach(t=>{
      const on = t.dataset.view === view;
      t.classList.toggle('active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    document.getElementById('appMain').classList.toggle('show-list', view === 'list');
    if(map) setTimeout(()=>map.invalidateSize(), 120);
  }

  function filterLocations(){
    const q = getQuery();
    return allLocations.filter(m=>{
      if(!validCoord(m) || !HAS_BIDET(m.bidetStatus)) return false;
      if(placeFilter==='mosque' && m.type!=='mosque') return false;
      if(extraFilter==='restaurant' && m.type!=='restaurant') return false;
      if(extraFilter==='warmed' && m.bidetStatus!=='warmed') return false;
      if(extraFilter==='verified' && m.bidetStatus!=='verified') return false;
      if(extraFilter==='internet' && m.bidetStatus!=='internet') return false;
      if(extraFilter==='public' && m.access!=='public') return false;
      if(extraFilter==='limited' && m.access!=='limited') return false;
      if(nearMe && userLocation){
        const dist = haversineMiles(userLocation,{lat:+m.latitude,lng:+m.longitude});
        if(dist>radiusMi) return false;
      }
      if(q){
        const hay = [m.name,m.city,m.address,m.country,m.bidetType||''].join(' ').toLowerCase();
        return hay.includes(q);
      }
      return true;
    });
  }

  function statusTag(m){
    if(m.bidetStatus==='internet') return '<span class="tag tag-internet">From internet</span>';
    if(m.bidetStatus==='warmed') return '<span class="tag tag-warmed">Heated / TOTO</span>';
    return '<span class="tag tag-verified">User verified</span>';
  }

  function accessTag(m){
    if(m.access==='limited') return '<span class="tag tag-limited">Limited access</span>';
    return '';
  }

  function accessWarn(m){
    if(m.access!=='limited') return '';
    return '<div class="access-warn"><strong>Limited access — not a public restroom</strong>'+escapeHtml(m.accessNote||'Hotel rooms, showrooms, and private clubs are not open to walk-in visitors.')+'</div>';
  }

  function typeLabel(t){ return t==='restaurant' ? 'Restaurant' : 'Masjid'; }

  function createIcon(status, access){
    let color = '#059669', emoji = '✓';
    if(status==='warmed'){ color = '#d97706'; emoji = '🔥'; }
    else if(status==='internet'){ color = '#2563eb'; emoji = '🌐'; }
    if(access==='limited'){ emoji = '🔒'; }
    const border = access==='limited' ? '2.5px dashed #fff' : '2.5px solid #fff';
    const ring = access==='limited' ? 'outline:2px dashed #fb923c;outline-offset:1px;' : '';
    return L.divIcon({
      html:'<div style="background:'+color+';color:#fff;border:'+border+';border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.22);font-size:13px;font-weight:700;'+ring+'">'+emoji+'</div>',
      className:'custom-marker', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-15]
    });
  }

  function sortedLocations(list){
    return [...list].sort((a,b)=>{
      if(a.access!==b.access){
        if(a.access==='public') return -1;
        if(b.access==='public') return 1;
      }
      if(nearMe && userLocation){
        const da=haversineMiles(userLocation,{lat:+a.latitude,lng:+a.longitude});
        const db=haversineMiles(userLocation,{lat:+b.latitude,lng:+b.longitude});
        return da-db;
      }
      return a.name.localeCompare(b.name);
    });
  }

  function cardStatusClass(m){
    if(m.access==='limited') return 'card-limited';
    if(m.bidetStatus==='internet') return 'card--internet';
    if(m.bidetStatus==='warmed') return 'card--warmed';
    return 'card--verified';
  }

  function renderList(filtered){
    const q=getQuery(), el=document.getElementById('locationList');
    const verified = filtered.filter(m=>m.bidetStatus==='verified').length;
    const warmed = filtered.filter(m=>m.bidetStatus==='warmed').length;
    const internet = filtered.filter(m=>m.bidetStatus==='internet').length;
    const limited = filtered.filter(m=>m.access==='limited').length;
    const pub = filtered.length - limited;
    const masajid = filtered.filter(m=>m.type==='mosque').length;
    let countHtml = '<strong>'+filtered.length+'</strong> '+(filtered.length===1?'place':'places');
    if(nearMe) countHtml += ' near you';
    const badges = [];
    if(masajid && placeFilter!=='mosque') badges.push(masajid+' masajed');
    if(pub) badges.push(pub+' public');
    if(limited) badges.push(limited+' limited');
    if(verified) badges.push(verified+' verified');
    if(warmed) badges.push(warmed+' heated');
    if(internet) badges.push(internet+' web');
    if(badges.length) countHtml += '<div class="count-badges">'+badges.map(b=>'<span class="count-badge">'+b+'</span>').join('')+'</div>';
    document.getElementById('countLabel').innerHTML = countHtml;
    if(!filtered.length){
      el.innerHTML='<div class="empty"><span class="empty-icon">🗺️</span>No places match your filters.<br>Try clearing filters or searching a different city.</div>';
      return;
    }
    el.innerHTML = sortedLocations(filtered).map(m=>{
      let dist='';
      if(nearMe && userLocation) dist = haversineMiles(userLocation,{lat:+m.latitude,lng:+m.longitude}).toFixed(1)+' mi';
      const limitedNote = m.access==='limited' ? '<p class="card-note">'+escapeHtml(m.accessNote)+'</p>' : '';
      const cardClass = 'card '+cardStatusClass(m);
      const typeIcon = m.type==='mosque' ? '🕌' : '🍽️';
      return '<article class="'+cardClass+'" data-id="'+m.id+'"><h3>'+highlight(m.name,q)+'</h3><div class="card-tags">'+statusTag(m)+accessTag(m)+'</div>'+(m.address?'<p class="addr">'+highlight(m.address,q)+'</p>':'')+(m.city?'<p class="loc">'+highlight(m.city,q)+(m.country?', '+highlight(m.country,q):'')+'</p>':'')+limitedNote+'<div class="card-meta"><span class="tag tag-type">'+typeIcon+' '+typeLabel(m.type)+'</span>'+(dist?'<span class="dist card-foot">'+dist+'</span>':'')+'</div></article>';
    }).join('');
    el.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openDetail(c.dataset.id)));
  }

  function renderMap(filtered){
    if(!clusterGroup) return;
    clusterGroup.clearLayers();
    filtered.forEach(m=>{
      const marker = L.marker([+m.latitude,+m.longitude],{icon:createIcon(m.bidetStatus,m.access)});
      marker.on('click',()=>openDetail(m.id));
      const tip = m.access==='limited' ? m.name + ' (limited access)' : m.name;
      marker.bindTooltip(tip,{direction:'top',offset:[0,-12]});
      clusterGroup.addLayer(marker);
    });
    if(filtered.length && !getQuery()){
      const bounds = L.latLngBounds(filtered.map(m=>[+m.latitude,+m.longitude]));
      if(bounds.isValid()) map.fitBounds(bounds.pad(0.15),{maxZoom:12,animate:false});
    }
  }

  function openDetail(id){
    const m=allLocations.find(x=>x.id===id);
    if(!m) return;
    if(map) map.setView([+m.latitude,+m.longitude], Math.max(map.getZoom(),14));
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    const cardEl = document.querySelector('.card[data-id="'+id+'"]');
    if(cardEl){
      cardEl.classList.add('active');
      cardEl.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
    const source = m.sourceUrl ? '<p class="sub" style="margin-top:12px"><a href="'+escapeHtml(m.sourceUrl)+'" target="_blank" rel="noopener">View web source ↗</a></p>' : '';
    const quote = m.sourceQuote ? '<blockquote class="source-quote"><strong>Review excerpt</strong>'+escapeHtml(m.sourceQuote)+'</blockquote>' : '';
    document.getElementById('detailContent').innerHTML =
      '<h2>'+escapeHtml(m.name)+'</h2>'+
      '<p class="sub">'+escapeHtml(typeLabel(m.type))+' · '+escapeHtml(m.city)+', '+escapeHtml(m.country)+'</p>'+
      accessWarn(m)+
      '<p>'+escapeHtml(m.address)+'</p>'+
      '<div class="row">'+statusTag(m)+accessTag(m)+(m.bidetType?'<span class="tag tag-type">'+escapeHtml(m.bidetType)+'</span>':'')+'</div>'+
      quote+source+
      '<div class="dialog-actions">'+
      '<a class="btn btn-primary" href="https://www.google.com/maps/search/?api=1&query='+m.latitude+','+m.longitude+'" target="_blank" rel="noopener">Open in Google Maps</a>'+
      '</div>';
    setOverlayOpen('detailOverlay', true);
    if(isMobile() && document.getElementById('appMain').classList.contains('show-list')){
      setMobileView('map');
    }
  }

  function refresh(){
    const filtered = filterLocations();
    renderList(filtered);
    renderMap(filtered);
    if(map) setTimeout(()=>map.invalidateSize(), 0);
  }

  function resetAddForm(){
    ['addName','addAddress','addCity','addEmail','addBidetType','addNotes','addLat','addLng'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value='';
    });
    document.getElementById('addCountry').value='USA';
    document.getElementById('addType').value='mosque';
    document.getElementById('addStatus').value='verified';
    document.getElementById('coordHint').classList.remove('show');
    if(pickMarker && map){ map.removeLayer(pickMarker); pickMarker=null; }
  }

  async function submitViaEmail(payload){
    const res = await fetch('https://formsubmit.co/ajax/' + encodeURIComponent(SUBMIT_EMAIL), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({
        _subject: 'BidetBeacon: new verified spot',
        _template: 'table',
        _captcha: 'false',
        name: payload.name,
        submitter_email: payload.email || '(not provided)',
        address: payload.address,
        city: payload.city,
        country: payload.country,
        type: payload.type,
        bidet_status: payload.bidetStatus,
        bidet_details: payload.bidetType,
        latitude: payload.latitude,
        longitude: payload.longitude,
        notes: payload.notes || '',
        maps_link: 'https://www.google.com/maps/search/?api=1&query=' + payload.latitude + ',' + payload.longitude
      })
    });
    const data = await res.json().catch(() => ({}));
    if(!res.ok || data.success === false){
      throw new Error(data.message || 'Submission failed. Try again in a moment.');
    }
    return 'Thanks! Sent to ymorsi8+bidet@gmail.com. We\'ll review and add it soon.';
  }

  function initMap(){
    map = L.map('map',{zoomControl:true}).setView([39.8283,-98.5795],4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
      maxZoom:19,
      attribution:'© OpenStreetMap · © CARTO'
    }).addTo(map);
    clusterGroup = L.markerClusterGroup({
      maxClusterRadius:40,
      iconCreateFunction:c=>L.divIcon({
        html:'<div style="background:#047857;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.18)">'+c.getChildCount()+'</div>',
        className:'custom-marker', iconSize:[36,36]
      })
    });
    map.addLayer(clusterGroup);
    map.zoomControl.setPosition(isMobile() ? 'topright' : 'bottomright');
    const mobileMq = window.matchMedia('(max-width:820px)');
    mobileMq.addEventListener('change', e=>{
      map.zoomControl.setPosition(e.matches ? 'topright' : 'bottomright');
      setTimeout(()=>map.invalidateSize(), 100);
    });
    setTimeout(()=>{ if(map) map.invalidateSize(); }, 150);
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',()=>{ if(map) map.invalidateSize(); });
    }
    window.addEventListener('resize',()=>{ if(map) map.invalidateSize(); });
    map.on('click', e=>{
      if(!document.getElementById('addOverlay').classList.contains('open')) return;
      const lat = e.latlng.lat, lng = e.latlng.lng;
      document.getElementById('addLat').value = lat.toFixed(6);
      document.getElementById('addLng').value = lng.toFixed(6);
      showCoordHint(lat, lng);
      if(pickMarker) map.removeLayer(pickMarker);
      pickMarker = L.marker(e.latlng,{icon:createIcon('verified')}).addTo(map);
    });
  }

  function wire(){
    initSubmitPanel();
    document.getElementById('searchInput').addEventListener('input', refresh);
    document.querySelectorAll('#placeFilter button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('#placeFilter button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        placeFilter = btn.dataset.type;
        refresh();
      });
    });
    document.querySelectorAll('#typeChips .chip').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const t = btn.dataset.type;
        if(extraFilter===t){
          extraFilter = null;
          btn.classList.remove('active');
        } else {
          document.querySelectorAll('#typeChips .chip').forEach(b=>b.classList.remove('active'));
          extraFilter = t;
          btn.classList.add('active');
        }
        refresh();
      });
    });
    document.getElementById('nearMeBtn').addEventListener('click',()=>{
      if(!navigator.geolocation){ alert('Geolocation not supported.'); return; }
      navigator.geolocation.getCurrentPosition(pos=>{
        userLocation = {lat:pos.coords.latitude,lng:pos.coords.longitude};
        nearMe = true;
        const btn = document.getElementById('nearMeBtn');
        btn.classList.add('active');
        const label = btn.querySelector('.btn-label');
        if(label) label.textContent = 'Near me ✓';
        if(isMobile()) setMobileView('map');
        if(map) map.setView([userLocation.lat,userLocation.lng],10);
        refresh();
      },()=>alert('Could not get your location.'));
    });
    document.querySelectorAll('.mobile-tab').forEach(tab=>{
      tab.addEventListener('click',()=> setMobileView(tab.dataset.view));
    });
    document.getElementById('addBtn').addEventListener('click',()=> setOverlayOpen('addOverlay', true));
    document.getElementById('addClose').addEventListener('click',()=>{ setOverlayOpen('addOverlay', false); resetAddForm(); });
    document.getElementById('detailClose').addEventListener('click',()=> setOverlayOpen('detailOverlay', false));
    ['detailOverlay','addOverlay'].forEach(id=>{
      document.getElementById(id).addEventListener('click',e=>{ if(e.target.id===id) setOverlayOpen(id, false); });
    });
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape'){
        setOverlayOpen('detailOverlay', false);
        setOverlayOpen('addOverlay', false);
        resetAddForm();
      }
    });
    document.getElementById('submitAdd').addEventListener('click', async ()=>{
      if(useAirtable()) return;
      const btn = document.getElementById('submitAdd');
      if(document.getElementById('addHoney').value) return;
      const name=document.getElementById('addName').value.trim();
      const lat=+document.getElementById('addLat').value, lng=+document.getElementById('addLng').value;
      const status=document.getElementById('addStatus').value;
      const bidetType=document.getElementById('addBidetType').value.trim();
      if(!name||isNaN(lat)||isNaN(lng)||!bidetType){
        alert('Name, bidet details, and a map pin are required.');
        return;
      }
      if(!HAS_BIDET(status)){ alert('Only verified or heated bidets can be submitted.'); return; }
      const payload={
        name,
        email: document.getElementById('addEmail').value.trim(),
        address: document.getElementById('addAddress').value.trim(),
        city: document.getElementById('addCity').value.trim(),
        country: document.getElementById('addCountry').value.trim()||'USA',
        type: document.getElementById('addType').value,
        bidetStatus: status,
        bidetType,
        latitude: String(lat),
        longitude: String(lng),
        notes: document.getElementById('addNotes').value.trim()
      };
      const prev = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const msg = await submitViaEmail(payload);
        setOverlayOpen('addOverlay', false);
        resetAddForm();
        alert(msg);
      } catch (err) {
        alert(err.message || 'Could not send submission.');
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    });
  }

  initData();
  wire();
  try{ if(typeof L!=='undefined') initMap(); }catch(e){ console.error(e); }
  refresh();
  if (typeof window.trackEvent === 'function') {
    window.trackEvent('bidetbeacon_view', { spots: String(allLocations.length) });
  }
})();
</script>
<script>
(function () {
  var portfolio = document.getElementById('bbFooterPortfolio');
  var halal = document.getElementById('bbFooterHalal');
  if (!portfolio || !halal) return;
  var path = location.pathname;
  var host = location.hostname;
  var inNewDir = /\/new\//i.test(path);
  var onGithubPages = host.indexOf('github.io') !== -1;
  if (location.protocol === 'file:' || inNewDir) {
    portfolio.href = 'index.html';
    halal.href = 'halal-vibes.html';
  } else if (onGithubPages) {
    portfolio.href = '/new/index.html';
    halal.href = '/new/halal-vibes.html';
  } else {
    portfolio.href = '/';
    halal.href = '/halal-vibes';
  }
})();
</script>
